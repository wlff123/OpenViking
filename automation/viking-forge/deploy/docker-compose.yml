services:
  app:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    restart: unless-stopped
    env_file: ${VIKING_FORGE_ENV_FILE:-.env}
    volumes:
      - viking-forge-data:/data
    expose:
      - "8080"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/healthz')"]
      interval: 30s
      timeout: 5s
      retries: 3

  caddy:
    image: caddy:2.10.2-alpine
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    environment:
      VIKING_FORGE_DOMAIN: ${VIKING_FORGE_DOMAIN}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

volumes:
  viking-forge-data:
  caddy-data:
  caddy-config:
